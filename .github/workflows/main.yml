name: ICA Triggered Workflow

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute'
        required: false
        default: 'deploy'
        type: string
      environment:
        description: 'Environment to run in'
        required: false
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production
      message:
        description: 'Custom message'
        required: false
        type: string

jobs:
  execute-task:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Display workflow information
        run: |
          echo "=========================================="
          echo "ICA Context Studio GitHub Integration"
          echo "=========================================="
          echo "Task: ${{ github.event.inputs.task }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Message: ${{ github.event.inputs.message }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "=========================================="
      
      - name: Execute task
        run: |
          echo "Executing ${{ github.event.inputs.task }} in ${{ github.event.inputs.environment }}"
          
          # Add your actual deployment/build/test commands here
          # Examples:
          
          if [ "${{ github.event.inputs.task }}" == "deploy" ]; then
            echo "🚀 Deploying to ${{ github.event.inputs.environment }}..."
            # Add deployment commands here
            # e.g., npm run deploy:${{ github.event.inputs.environment }}
            echo "✅ Deployment completed successfully!"
          
          elif [ "${{ github.event.inputs.task }}" == "build" ]; then
            echo "🔨 Building application..."
            # Add build commands here
            # e.g., npm run build
            echo "✅ Build completed successfully!"
          
          elif [ "${{ github.event.inputs.task }}" == "test" ]; then
            echo "🧪 Running tests..."
            # Add test commands here
            # e.g., npm test
            echo "✅ Tests completed successfully!"
          
          else
            echo "❌ Unknown task: ${{ github.event.inputs.task }}"
            exit 1
          fi
      
      - name: Summary
        run: |
          echo "=========================================="
          echo "Workflow Execution Summary"
          echo "=========================================="
          echo "Status: ✅ Success"
          echo "Task: ${{ github.event.inputs.task }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Duration: ${{ job.status }}"
          echo "=========================================="
          echo ""
          echo "View this run at:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

